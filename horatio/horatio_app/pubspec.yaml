name: horatio_app
description: >-
  Horatio — the actor's faithful companion for script memorization.
  Multiplatform app with dialogue rehearsal and spaced repetition.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.11.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7
  go_router: ^17.1.0
  flutter_tts: ^4.2.0
  file_picker: ^10.3.10
  desktop_drop: ^0.7.0
  device_preview: ^1.3.1
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.0
  path: ^1.9.0
  intl: ^0.20.2
  horatio_core:
    path: ../horatio_core
  speech_to_text: ^7.3.0
  record: ^6.2.0

  archive: any
  xml: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.0
  plugin_platform_interface: any
flutter:
  uses-material-design: true
  assets:
    - assets/public_domain/
